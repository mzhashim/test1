<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Learning Player Pro</title>
    <style>
        :root { 
            --primary-color: #ff4500; 
            --bg-color: #121212; 
            --panel-bg: #1e1e1e; 
            --accent-blue: #007bff; 
            --accent-green: #28a745; 
            --gemini-blue: #4285f4;
            --memo-bg: #2a2a2a; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: #e0e0e0; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 600px; padding-bottom: 60px; }
        
        /* 動画選択リスト */
        .video-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
        .video-btn { flex: 1 1 30%; min-width: 80px; padding: 12px 5px; background: #2c2c2c; border: 1px solid #444; color: #fff; cursor: pointer; border-radius: 8px; font-size: 12px; }
        .video-btn.active { background: var(--primary-color); border-color: var(--primary-color); font-weight: bold; }

        /* プレイヤー（スマホでスクロールしても上部に固定） */
        #player-container { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        #player { width: 100%; height: 100%; }

        /* パネル共通 */
        .panel { margin-top: 15px; background: var(--panel-bg); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .control-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: space-between; align-items: center; }
        .label { font-size: 11px; color: #888; width: 100%; margin-bottom: 2px; border-left: 3px solid var(--primary-color); padding-left: 8px; text-transform: uppercase; }
        
        button { 
            flex: 1; 
            min-width: 50px; 
            padding: 14px 2px; 
            border: none; 
            border-radius: 10px; 
            background: #333; 
            color: white; 
            cursor: pointer; 
            font-size: 14px; 
            -webkit-tap-highlight-color: transparent; 
        }
        button:active { background: #555; transform: scale(0.96); }
        
        .speed-btn.active { background: var(--accent-blue); }
        .loop-btn.active { background: var(--accent-green); }
        .cc-btn { background: #444; font-size: 11px; }
        
        .info-display { 
            text-align: center; 
            font-family: monospace; 
            font-size: 1.1em; 
            color: #00ffcc; 
            background: #000; 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 5px; 
        }

        /* メモ機能 */
        #memo-area { 
            width: 100%; 
            height: 120px; 
            background: var(--memo-bg); 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 10px; 
            padding: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            line-height: 1.5; 
            resize: none;
            -webkit-appearance: none;
        }
        .save-status { font-size: 11px; color: var(--accent-green); text-align: right; height: 14px; margin-top: -5px; }

        /* Geminiボタン */
        .gemini-btn { 
            background: linear-gradient(135deg, #4285f4, #34a853) !important; 
            font-weight: bold; 
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-selector">
        <button class="video-btn active" onclick="switchVideo('SerbAkU-6QY', this)">L4-1</button>
        <button class="video-btn" onclick="switchVideo('SZqQoAsmRt4', this)">L4-2</button>
        <button class="video-btn" onclick="switchVideo('o8zih_IEBms', this)">L4-3</button>
        <button class="video-btn" onclick="switchVideo('zvzk2HPRyWI', this)">L4-4</button>
        <button class="video-btn" onclick="switchVideo('jcPikw4KNuE', this)">L4-5</button>
    </div>

    <div id="player-container">
        <div id="player"></div>
    </div>

    <div class="panel">
        <div class="label">Speed Control</div>
        <div class="control-group">
            <button class="speed-btn" onclick="setSpeed(0.2, this)">0.2x</button>
            <button class="speed-btn" onclick="setSpeed(0.5, this)">0.5x</button>
            <button class="speed-btn active" onclick="setSpeed(1.0, this)">1.0x</button>
        </div>

        <div class="label">Seek / Fast Forward</div>
        <div class="control-group">
            <button onclick="seek(-2.0)">-2.0s</button>
            <button onclick="seek(-0.5)">-0.5s</button>
            <button style="background:#555;" onclick="seek(3.0)">+3.0s</button>
        </div>

        <div class="label">Captions</div>
        <div class="control-group">
            <button class="cc-btn" onclick="setCaption('en')">EN ON</button>
            <button class="cc-btn" onclick="setCaption('ja')">JA ON</button>
            <button class="cc-btn" onclick="setCaption('none')">OFF</button>
        </div>

        <div class="label">A-B Loop</div>
        <div class="control-group">
            <button onclick="setPoint('A')">A点</button>
            <button onclick="setPoint('B')">B点</button>
            <button id="btnLoop" class="loop-btn" onclick="toggleLoop()">LOOP: OFF</button>
            <button onclick="resetLoop()">Reset</button>
        </div>

        <div class="info-display" id="status">A: -- | B: --</div>
    </div>

    <div class="panel">
        <div class="label">Learning Notes & AI Coach</div>
        <textarea id="memo-area" placeholder="気になったフレーズを記録..."></textarea>
        <div class="save-status" id="save-msg"></div>
        
        <div class="control-group">
            <button style="background: var(--accent-blue);" onclick="saveMemo()">メモ保存</button>
            <button style="background: #555;" onclick="clearMemo()">消去</button>
        </div>

        <button class="gemini-btn" onclick="askGemini()">
            <span>✨</span> Geminiに声で相談する
        </button>
    </div>
</div>

<script>
    let player;
    let pointA = null, pointB = null;
    let isLooping = false;
    let loopCheckInterval;

    // YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    window.onload = function() {
        const savedMemo = localStorage.getItem('yt_study_memo');
        if (savedMemo) document.getElementById('memo-area').value = savedMemo;
    };

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'SerbAkU-6QY',
            playerVars: { 
                'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1, 
                'cc_load_policy': 1, 'cc_lang_pref': 'en',
                'origin': window.location.origin 
            },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function switchVideo(id, btn) {
        player.loadVideoById(id);
        resetLoop();
        document.querySelectorAll('.video-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setSpeed(rate, btn) {
        player.setPlaybackRate(rate);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function seek(sec) {
        player.seekTo(player.getCurrentTime() + sec, true);
    }

    function setCaption(lang) {
        if (!player) return;
        if (lang === 'none') {
            player.unloadModule('captions');
        } else {
            player.loadModule('captions');
            player.setOption('captions', 'track', {'languageCode': lang});
        }
    }

    function setPoint(type) {
        const now = player.getCurrentTime();
        if (type === 'A') pointA = now; else pointB = now;
        updateStatus();
    }

    function toggleLoop() {
        if (pointA === null || pointB === null) return alert("AとBの両方をセットしてください");
        isLooping = !isLooping;
        const btn = document.getElementById('btnLoop');
        btn.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
        btn.classList.toggle('active', isLooping);
    }

    function resetLoop() {
        pointA = pointB = null; isLooping = false;
        const btn = document.getElementById('btnLoop');
        btn.innerText = "LOOP: OFF";
        btn.classList.remove('active');
        updateStatus();
    }

    function updateStatus() {
        document.getElementById('status').innerText = 
            `A: ${pointA !== null ? pointA.toFixed(2) + 's' : '--'} | B: ${pointB !== null ? pointB.toFixed(2) + 's' : '--'}`;
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            if (!loopCheckInterval) {
                loopCheckInterval = setInterval(() => {
                    if (isLooping && pointA !== null && pointB !== null) {
                        const now = player.getCurrentTime();
                        if (now >= pointB || now < pointA - 0.1) player.seekTo(pointA);
                    }
                }, 100);
            }
        } else {
            clearInterval(loopCheckInterval);
            loopCheckInterval = null;
        }
    }

    // メモ
    function saveMemo() {
        localStorage.setItem('yt_study_memo', document.getElementById('memo-area').value);
        const msg = document.getElementById('save-msg');
        msg.innerText = "Saved at " + new Date().toLocaleTimeString();
        setTimeout(() => msg.innerText = "", 3000);
    }

    function clearMemo() {
        if (confirm("メモをすべて消去しますか？")) {
            document.getElementById('memo-area').value = "";
            localStorage.removeItem('yt_study_memo');
        }
    }

    // Gemini相談：スマホでの確実な動作のため href を使用
    function askGemini() {
        // 現在のタブでGeminiを開くことで、ポップアップブロックを回避します
        window.location.href = "https://gemini.google.com/app";
    }
</script>

</body>
</html>
