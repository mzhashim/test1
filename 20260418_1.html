<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube 英語学習プレイヤー</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 850px; }
        #player-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #player { width: 100%; height: 100%; }
        
        .video-selector { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .video-btn { padding: 10px 20px; background: #2c2c2c; border: 1px solid #444; color: #fff; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        .video-btn:hover { background: #3d3d3d; }
        .video-btn.active { background: #ff4500; border-color: #ff4500; }

        .control-panel { margin-top: 25px; background: #1e1e1e; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
        .control-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        
        button { padding: 10px 16px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:hover { background: #444; }
        button:active { transform: translateY(2px); }
        
        .speed-btn.active { background: #007bff; }
        .loop-btn.active { background: #28a745; }
        
        .info-display { text-align: center; font-family: monospace; font-size: 1.1em; color: #00ffcc; background: #000; padding: 8px; border-radius: 4px; }
        .label { font-size: 0.8em; color: #888; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="video-selector">
        <button class="video-btn active" onclick="switchVideo('SerbAkU-6QY', this)">動画 1 (Falling over themselves)</button>
        <button class="video-btn" onclick="switchVideo('SZqQoAsmRt4', this)">動画 2 (Unexpected favor)</button>
    </div>

    <div id="player-container">
        <div id="player"></div>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <span class="label">SPEED:</span>
            <button class="speed-btn" onclick="setSpeed(0.2, this)">0.2x</button>
            <button class="speed-btn" onclick="setSpeed(0.5, this)">0.5x</button>
            <button class="speed-btn active" onclick="setSpeed(1.0, this)">1.0x</button>
        </div>

        <div class="control-group">
            <span class="label">SEEK:</span>
            <button onclick="seek(-0.5)">-0.5s</button>
            <button onclick="seek(-2.0)">-2.0s</button>
        </div>

        <div class="control-group">
            <span class="label">LOOP:</span>
            <button id="btnA" onclick="setPoint('A')">A地点をセット</button>
            <button id="btnB" onclick="setPoint('B')">B地点をセット</button>
            <button id="btnLoop" class="loop-btn" onclick="toggleLoop()">リピート: OFF</button>
            <button onclick="resetLoop()">リセット</button>
        </div>

        <div class="info-display" id="status">A: -- | B: --</div>
    </div>
</div>

<script>
    let player;
    let pointA = null;
    let pointB = null;
    let isLooping = false;
    let loopCheckInterval;

    // YouTube IFrame APIの読み込み
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'SerbAkU-6QY',
            playerVars: {
                'autoplay': 0,
                'controls': 1,
                'rel': 0,
                'modestbranding': 1,
                'origin': window.location.origin
            },
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function switchVideo(id, btn) {
        player.loadVideoById(id);
        resetLoop();
        
        // ボタンの外見更新
        document.querySelectorAll('.video-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setSpeed(rate, btn) {
        player.setPlaybackRate(rate);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function seek(sec) {
        player.seekTo(player.getCurrentTime() + sec, true);
    }

    function setPoint(type) {
        const now = player.getCurrentTime();
        if (type === 'A') {
            pointA = now;
        } else {
            pointB = now;
        }
        updateStatus();
    }

    function toggleLoop() {
        if (pointA === null || pointB === null) {
            alert("A地点とB地点の両方をセットしてください");
            return;
        }
        isLooping = !isLooping;
        const btn = document.getElementById('btnLoop');
        btn.innerText = isLooping ? "リピート: ON" : "リピート: OFF";
        btn.classList.toggle('active', isLooping);
    }

    function resetLoop() {
        pointA = pointB = null;
        isLooping = false;
        const btn = document.getElementById('btnLoop');
        btn.innerText = "リピート: OFF";
        btn.classList.remove('active');
        updateStatus();
    }

    function updateStatus() {
        document.getElementById('status').innerText = 
            `A: ${pointA !== null ? pointA.toFixed(2) + 's' : '--'} | B: ${pointB !== null ? pointB.toFixed(2) + 's' : '--'}`;
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            if (!loopCheckInterval) {
                loopCheckInterval = setInterval(() => {
                    if (isLooping && pointA !== null && pointB !== null) {
                        const now = player.getCurrentTime();
                        if (now >= pointB || now < pointA - 0.1) {
                            player.seekTo(pointA);
                        }
                    }
                }, 100);
            }
        } else {
            clearInterval(loopCheckInterval);
            loopCheckInterval = null;
        }
    }
</script>

</body>
</html>
