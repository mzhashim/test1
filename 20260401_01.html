<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCSP Ultra-Compact Quiz</title>
    <style>
        :root { --p: #1a73e8; --bg: #f0f2f5; --ok: #2e7d32; --ng: #d32f2f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* ヘッダー最小化 */
        .header { position: sticky; top: 0; width: 100%; background: white; z-index: 1000; padding: 4px 0; border-bottom: 1px solid #ddd; text-align: center; }
        .score-board { font-size: 0.85rem; font-weight: bold; color: var(--p); }

        .container { width: 100%; max-width: 480px; padding: 4px; display: flex; flex-direction: column; gap: 4px; }

        /* カード構造：高さ固定を解除して崩れを防止 */
        .card { perspective: 1000px; width: 100%; margin: 0; }
        .card-inner { position: relative; width: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { 
            width: 100%; min-height: 100px; 
            backface-visibility: hidden; border-radius: 4px; padding: 8px; 
            box-sizing: border-box; background: white; border: 1px solid #ccc;
        }
        .card-back { position: absolute; top: 0; left: 0; height: 100%; background: #263238; color: white; transform: rotateY(180deg); overflow-y: auto; }

        .q-num { font-size: 0.7rem; color: #777; margin-bottom: 2px; }
        .q-text { font-size: 0.9rem; line-height: 1.2; margin: 0 0 6px 0; font-weight: bold; color: #222; }

        .options { display: flex; flex-direction: column; gap: 3px; }
        .opt-btn { 
            background: #fff; border: 1px solid #ddd; border-radius: 4px; 
            padding: 4px 8px; font-size: 0.85rem; text-align: left; line-height: 1.1;
            -webkit-tap-highlight-color: transparent;
        }

        .opt-btn.correct { background: #e8f5e9; border-color: var(--ok); color: var(--ok); font-weight: bold; }
        .opt-btn.wrong { background: #ffebee; border-color: var(--ng); color: var(--ng); font-weight: bold; }

        .ans-label { color: #ffeb3b; font-size: 0.9rem; font-weight: bold; }
        .exp-text { font-size: 0.8rem; line-height: 1.3; color: #eee; margin-top: 4px; }
        
        .wrong-summary { width: 100%; max-width: 480px; padding: 8px; background: white; margin-bottom: 40px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div class="score-board" id="scoreDisp">Score: 0 / 0</div>
</div>

<div class="container" id="quizContainer"></div>

<div class="wrong-summary">
    <div style="font-size:0.8rem; color:var(--ng); font-weight:bold; margin-bottom:4px;">復習: <span id="wrongList"></span></div>
</div>

<script>
// --- 120問のデータをここに貼り付け ---
const quizData = [
 {q:"1", f:"SaaS環境内の次のタスクのうち、クラウドの顧客が責任を負わないものはどれですか？", o:["A","B","C","D"], ot:["A.認証メカニズム","B.ブランディング","C.トレーニング","D.ユーザーアクセス"], a:"A", e:"Explanation: The authentication mechanisms and implementations are the responsibility of the cloud provider because they are core components of the application platform and service."},
    {q:"2", f:"ユーザーアカウント/アクセスのレビューとメンテナンスに誰が関与する必要がありますか？", o:["A","B","C","D"], ot:["A.ユーザーのマネージャー","B.セキュリティマネージャー","C.経理部","D.インシデント対応チーム"], a:"A", e:"Answer: A"},
    {q:"3", f:"次の用語のうち、リスク許容の一般的に使用されるカテゴリではないものはどれですか？", o:["A","B","C","D"], ot:["A.中程度","B.クリティカル","C.最小限","D.受け入れ"], a:"D", e:"Explanation: Accepted is not a risk acceptance category. The risk acceptance categories are minimal, low, moderate, high, and critical."},
    {q:"4", f:"米国国務省は、技術輸出として知られているものとして何を管理していますか？", o:["A","B","C","D"], ot:["A.DRM","B.ITAR","C.EAR","D.EAL"], a:"B", e:"Explanation: The U.S. State Department manages ITAR, whereas the U.S. Commerce Department manages EAR."},
    {q:"5", f:"プロバイダーが監視テストの責任共有の一環として、クラウドのお客様に提供しないものは次のうちどれですか？", o:["A","B","C","D"], ot:["A.監査ログ","B.DLPの結果","C.セキュリティ管理","D.ログ"], a:"C", e:"Explanation: The cloud provider will not provide actual security controls but will provide the output of various security logs and monitoring tools."},
    {q:"6", f:"特定のシステムが従わなければならない法的規制の主な決定要因は何ですか？", o:["A","B","C","D"], ot:["A.データソース","B.物理的な場所","C.契約上の合意","D.サービスレベル契約"], a:"B", e:"Explanation: The primary factor that determines legal jurisdiction is the physical location of the systems."},
    {q:"7", f:"オブジェクトストレージの保護に広く使用されている技術は次のうちどれですか？", o:["A","B","C","D"], ot:["A.TLS","B.HTTPS","C.VPN","D.IRM"], a:"D", e:"Explanation: Information Rights Management (IRM) is commonly used to protect object storage by embedding permissions and protection directly into the files."},
    {q:"8", f:"BCDRの使用を最も魅力的にしているクラウドの側面はどれですか？", o:["A","B","C","D"], ot:["A.オンデマンドのセルフサービス","B.測定サービス","C.移植性","D.幅広いネットワークアクセス"], a:"B", e:"Explanation: Measured service is what makes BCDR very attractive within a cloud environment because a customer will only pay for the storage and resources they are using."},
    {q:"9", f:"従来のファイルシステムとツリー構造に最も近いのはどれですか。", o:["A","B","C","D"], ot:["A.ボリュームストレージ","B.非構造化データ","C.オブジェクトストレージ","D.構造化データ"], a:"A", e:"Explanation: Volume storage is most similar to a traditional file system or tree structure used by operating systems."},
    {q:"10", f:"要件収集プロセスへの入力として含まれないのは次のうちどれですか？", o:["A","B","C","D"], ot:["A.ユーザー","B.経営陣","C.規制当局","D.監査人"], a:"D", e:"Explanation: Auditors are not an input for the requirements gathering process; they verify that the processes and requirements have been met."},
    {q:"11", f:"監査範囲ステートメントの一部として通常含まれないものは次のうちどれですか？", o:["A","B","C","D"], ot:["A.レポート","B.認証","C.請求","D.除外"], a:"C", e:"Explanation: Billing information is not part of an audit scope statement, which focuses on security, operations, and compliance."},
    {q:"12", f:"クラウドプロバイダーが負う「絶対的な」責任は次のうちどれですか？", o:["A","B","C","D"], ot:["A.コンプライアンス","B.物理的セキュリティ","C.OSの監査","D.個人のセキュリティ"], a:"B", e:"Explanation: Physical security is the absolute responsibility of the cloud provider in any cloud model."},
    {q:"13", f:"データセンターの設計にマクロレベルのアプローチを利用しているのはどれですか？", o:["A","B","C","D"], ot:["A.IDCA","B.BICSI","C.Uptime Institute","D.NFPA"], a:"A", e:"Explanation: IDCA utilizes a macro-level approach to data center design, covering all aspects and systems."},
    {q:"14", f:"TLSプロトコルを構成する2つの主要なプロトコルは何ですか？", o:["A","B","C","D"], ot:["A.ハンドシェイクとレコード","B.トランスポートとセッション","C.認証と暗号化","D.記録と送信"], a:"A", e:"Explanation: TLS is composed of two layers: the TLS Record Protocol and the TLS Handshake Protocol."},
    {q:"15", f:"SLAの評価指標（メトリクス）に通常含まれないものはどれですか？", o:["A","B","C","D"], ot:["A.ネットワークの可用性","B.ユーザーの総数","C.メモリ使用量","D.CPU負荷"], a:"B", e:"Explanation: The total number of users is not a performance metric for an SLA, although it might be a licensing factor."},
    {q:"16", f:"BCDRプランを起動する一般的な理由ではないものはどれですか？", o:["A","B","C","D"], ot:["A.自然災害","B.大規模な停電","C.従業員の離職","D.テロ攻撃"], a:"C", e:"Explanation: Loss of staff is generally handled by HR and succession planning, not a BCDR plan."},
    {q:"17", f:"使用しているクラウドモデルに関係なく、クラウドのお客様が常に責任を負うのはどれですか？", o:["A","B","C","D"], ot:["A.インフラ","B.プラットフォーム","C.アプリケーション","D.データ"], a:"D", e:"Explanation: The cloud customer is always responsible for their data, regardless of the cloud model used."},
    {q:"18", f:"クラウドBCDRで一般的ではないモデルはどれですか？", o:["A","B","C","D"], ot:["A.クラウドから別のクラウドへのバックアップ","B.クラウドから別のプロバイダーへのバックアップ","C.同一プロバイダー内でのバックアップ","D.クラウドプロバイダーからプライベートクラウドへのバックアップ"], a:"D", e:"Explanation: Backing up from a public cloud provider to a private cloud is generally not a common or practical model."},
    {q:"19", f:"組織間でID情報や認証資格情報を渡すために最も一般的に利用されるのは？", o:["A","B","C","D"], ot:["A.REST","B.SAML","C.SOAP","D.HTML"], a:"B", e:"Explanation: Security Assertion Markup Language (SAML) is the standard for exchanging authentication and authorization data between parties."},
    {q:"20", f:"ISO/IEC標準において、情報開示の概念に最も関連するのはどれですか？", o:["A","B","C","D"], ot:["A.開示","B.透明性","C.開放性","D.ドキュメント化"], a:"B", e:"Explanation: Transparency is the concept of being open and honest about how data is handled and what services are provided."},
    {q:"21", f:"どのSOCレポートが最も一般的であり、システムとその管理策の詳細な説明が含まれていますか？", o:["A","B","C","D"], ot:["A.SOC 1","B.SOC 2","C.SOC 3","D.SOC 4"], a:"B", e:"Explanation: SOC 2 provides a detailed description of the service provider's system and the suitability of the design and operating effectiveness of its controls."},
    {q:"22", f:"クラウドのお客様とクラウドプロバイダーの間の契約において、法的な場所を定義する用語はどれですか？", o:["A","B","C","D"], ot:["A.管轄区域","B.居住地","C.場所","D.SLA"], a:"A", e:"Explanation: Jurisdiction is the legal term for where a contract is enforced and which laws apply."},
    {q:"23", f:"マルチテナンシー環境において、データの分離を確実にするために使用される技術はどれですか？", o:["A","B","C","D"], ot:["A.暗号化","B.ハッシュ化","C.マスキング","D.トークン化"], a:"A", e:"Explanation: Encryption is the most effective way to ensure data separation in a multi-tenant environment."},
    {q:"24", f:"データセンターの物理的設計において、火災検知と抑制の標準を提供しているのはどれですか？", o:["A","B","C","D"], ot:["A.NFPA","B.IDCA","C.BICSI","D.Uptime Institute"], a:"A", e:"Explanation: The National Fire Protection Association (NFPA) provides standards for fire detection and suppression systems."},
    {q:"25", f:"APIのセキュリティを確保するために、特定のソースからのリクエスト数を制限する手法はどれですか？", o:["A","B","C","D"], ot:["A.レート制限","B.フィルタリング","C.暗号化","D.認証"], a:"A", e:"Explanation: Rate limiting is used to prevent abuse of an API by limiting the number of requests within a timeframe."},
    {q:"26", f:"クラウド環境において、仮想マシン（VM）のイメージを保護するために重要なのはどれですか？", o:["A","B","C","D"], ot:["A.署名","B.圧縮","C.バックアップ","D.削除"], a:"A", e:"Explanation: Digital signatures ensure the integrity and authenticity of VM images."},
    {q:"27", f:"データの機密性を維持するために、元のデータを無関係な値に置き換える手法はどれですか？", o:["A","B","C","D"], ot:["A.トークン化","B.暗号化","C.ハッシュ化","D.符号化"], a:"A", e:"Explanation: Tokenization replaces sensitive data with a non-sensitive equivalent (token) that has no extrinsic meaning."},
    {q:"28", f:"クラウドにおけるアイデンティティ管理において、ユーザーが一度のログインで複数のシステムにアクセスできる機能は？", o:["A","B","C","D"], ot:["A.SSO","B.MFA","C.RBAC","D.ABAC"], a:"A", e:"Explanation: Single Sign-On (SSO) allows a user to authenticate once and access multiple systems."},
    {q:"29", f:"クラウドプロバイダーが提供するセキュリティ管理策を評価するために、お客様が使用できる標準はどれですか？", o:["A","B","C","D"], ot:["A.CSA CCM","B.ISO 9001","C.ISO 14001","D.SLA"], a:"A", e:"Explanation: The Cloud Security Alliance (CSA) Cloud Controls Matrix (CCM) is specifically designed for assessing cloud security controls."},
    {q:"30", f:"データの整合性を確認するために、データから生成される固定長の値を何と呼びますか？", o:["A","B","C","D"], ot:["A.ハッシュ","B.暗号鍵","C.証明書","D.トークン"], a:"A", e:"Explanation: A hash value is used to verify that data has not been altered."},
    {q:"31", f:"クラウドにおける責任共有モデルにおいて、IaaSを使用する場合、パッチ適用は誰の責任ですか？", o:["A","B","C","D"], ot:["A.クラウドのお客様","B.クラウドプロバイダー","C.OSベンダー","D.共同責任"], a:"A", e:"Explanation: In IaaS, the customer is responsible for managing and patching the operating system and applications."},
    {q:"32", f:"クラウドデータのライフサイクルにおいて、データが最初に入力または生成されるフェーズはどれですか？", o:["A","B","C","D"], ot:["A.作成","B.保存","C.使用","D.共有"], a:"A", e:"Explanation: Create is the first phase where data is generated or existing data is modified."},
    {q:"33", f:"クラウド環境において、ネットワークトラフィックを監視し、不正なアクセスをブロックするデバイスはどれですか？", o:["A","B","C","D"], ot:["A.IPS","B.IDS","C.ルーター","D.スイッチ"], a:"A", e:"Explanation: An Intrusion Prevention System (IPS) monitors and takes action to block malicious traffic."},
    {q:"34", f:"データの「静止状態（at rest）」での保護に最も一般的に使用されるのはどれですか？", o:["A","B","C","D"], ot:["A.ストレージレベルの暗号化","B.TLS","C.SSL","D.VPN"], a:"A", e:"Explanation: Encryption at the storage or file level is the primary method for protecting data at rest."},
    {q:"35", f:"クラウドプロバイダーが物理的な場所のセキュリティを証明するために提供できるものはどれですか？", o:["A","B","C","D"], ot:["A.第三者監査レポート","B.監視カメラの映像","C.入館ログ","D.設計図"], a:"A", e:"Explanation: Third-party audit reports (like SOC 2) provide verification of physical and logical controls."},
    {q:"36", f:"クラウド利用において、特定のベンダーに依存しすぎて他社への移行が困難になるリスクを何と呼びますか？", o:["A","B","C","D"], ot:["A.ベンダーロックイン","B.ベンダーロックアウト","C.マルチテナンシー","D.相互運用性"], a:"A", e:"Explanation: Vendor lock-in occurs when a customer is unable to move their data or services away from a provider easily."},
    {q:"37", f:"Webアプリケーションに対する一般的な攻撃（SQLインジェクションなど）を防ぐために使用されるのはどれですか？", o:["A","B","C","D"], ot:["A.WAF","B.IDS","C.次世代ファイアウォール","D.VPN"], a:"A", e:"Explanation: A Web Application Firewall (WAF) is specifically designed to protect web applications from common attacks."},
    {q:"38", f:"クラウド環境でリソースを論理的に分離し、自分専用のネットワークを構築できる機能はどれですか？", o:["A","B","C","D"], ot:["A.VPC","B.CDN","C.SDN","D.MPLS"], a:"A", e:"Explanation: A Virtual Private Cloud (VPC) provides a private, isolated section of the public cloud."},
    {q:"39", f:"データのライフサイクルにおいて、不要になったデータを安全に消去するフェーズはどれですか？", o:["A","B","C","D"], ot:["A.破棄","B.アーカイブ","C.保存","D.使用"], a:"A", e:"Explanation: Destroy is the final phase where data is permanently removed."},
    {q:"40", f:"SOC 3レポートとSOC 2レポートの主な違いは何ですか？", o:["A","B","C","D"], ot:["A.SOC 3は一般公開用である","B.SOC 3はより詳細である","C.SOC 3は非公開である","D.SOC 3は財務のみを扱う"], a:"A", e:"Explanation: SOC 3 is a general-use report that summarizes the information in SOC 2 for a public audience."},
{q:"41", f:"クラウドコンピューティングにおける「弾力性（Elasticity）」の定義に最も近いのはどれですか？", o:["A","B","C","D"], ot:["A.ピーク負荷に合わせてリソースを固定する能力","B.リソースの需要に合わせて動的に拡大・縮小する能力","C.ハードウェアの物理的な柔軟性","D.ネットワークの遅延を最小限に抑える能力"], a:"B", e:"Answer: B"},
    {q:"42", f:"クラウド環境において、データがメモリ内で処理されている最中の状態を何と呼びますか？", o:["A","B","C","D"], ot:["A.Data at rest","B.Data in transit","C.Data in use","D.Data in archive"], a:"C", e:"Answer: C"},
    {q:"43", f:"STRIDE脅威モデルにおいて、情報の漏洩（Information Disclosure）に対応する防御策はどれですか？", o:["A","B","C","D"], ot:["A.認証","B.デジタル署名","C.暗号化","D.入力バリデーション"], a:"C", e:"Answer: C"},
    {q:"44", f:"SOC 1レポートの主な目的は何ですか？", o:["A","B","C","D"], ot:["A.セキュリティ、可用性、機密性の報告","B.財務報告に係る内部統制の評価","C.一般公開用の簡易レポート","D.物理的セキュリティの証明"], a:"B", e:"Answer: B"},
    {q:"45", f:"ISO/IEC 27018が特に対象としているものはどれですか？", o:["A","B","C","D"], ot:["A.パブリッククラウドにおけるPIIの保護","B.クラウドの相互運用性","C.データセンターの設計基準","D.ソフトウェア開発ライフサイクル"], a:"A", e:"Answer: A"},
    {q:"46", f:"クラウドデータのライフサイクルにおける「保存（Store）」フェーズと「アーカイブ（Archive）」フェーズの主な違いは何ですか？", o:["A","B","C","D"], ot:["A.使用される暗号化アルゴリズム","B.データの冗長性レベル","C.データの可用性とアクセスの頻度","D.データの法的所有権"], a:"C", e:"Answer: C"},
    {q:"47", f:"「暗号化消去（Crypto-shredding）」のプロセスにおいて、最も重要な要素は何ですか？", o:["A","B","C","D"], ot:["A.バックアップデータの削除","B.暗号鍵の破棄","C.ストレージメディアの物理的破壊","D.データの複数回上書き"], a:"B", e:"Answer: B"},
    {q:"48", f:"クラウド環境において、管理プレーン（Management Plane）へのアクセスを保護するために最も推奨される手法はどれですか？", o:["A","B","C","D"], ot:["A.強力なパスワードのみ","B.多要素認証（MFA）","C.IPアドレス制限のみ","D.匿名アクセスの許可"], a:"B", e:"Answer: B"},
    {q:"49", f:"次のうち、クラウドにおける「相互運用性（Interoperability）」を説明しているものはどれですか？", o:["A","B","C","D"], ot:["A.コンポーネントが組み合わされて動作する能力","B.サービスを別のプロバイダーへ移動する能力","C.システムの稼働時間を維持する能力","D.コストを削減する能力"], a:"A", e:"Answer: A"},
    {q:"50", f:"欧州連合（EU）の一般データ保護規則（GDPR）において、データの処理方法を決定する個人または組織を何と呼びますか？", o:["A","B","C","D"], ot:["A.データプロセッサ","B.データコントローラー","C.データサブジェクト","D.データ保護責任者（DPO）"], a:"B", e:"Answer: B"},
    {q:"51", f:"BCDR戦略において、データの損失が許容される最大時間を指す用語はどれですか？", o:["A","B","C","D"], ot:["A.RTO","B.RPO","C.MTPD","D.SLA"], a:"B", e:"Answer: B"},

    {q:"117", f:"米国の医療情報保護法であるHIPAAが対象とする情報は？", o:["A","B","C","D"], ot:["A.財務情報","B.個人健康情報 (PHI)","C.クレジットカード番号","D.教育記録"], a:"B", e:"Answer: B"},
    {q:"118", f:"IaaS、PaaS、SaaSのうち、顧客の管理範囲が最も広いのは？", o:["A","B","C","D"], ot:["A.IaaS","B.PaaS","C.SaaS","D.すべて同じ"], a:"A", e:"Answer: A"},
    {q:"119", f:"クラウド環境でのペネトレーションテストを実施する際に不可欠な手続きは？", o:["A","B","C","D"], ot:["A.サーバーの停止","B.プロバイダーへの事前通知と承認","C.パスワードの公開","D.週末の深夜に行うこと"], a:"B", e:"Answer: B"},
    {q:"120", f:"クラウドにおけるデータのライフサイクルは、どのフェーズで終了しますか？", o:["A","B","C","D"], ot:["A.アーカイブ","B.共有","C.使用","D.破棄"], a:"D", e:"Answer: D"}
];

const container = document.getElementById('quizContainer');
const scoreDisp = document.getElementById('scoreDisp');
const wrongList = document.getElementById('wrongList');

let totalAnswered = 0;
let correctCount = 0;
let wrongSet = new Set();

function render() {
    quizData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${item.q}`;
        const inner = document.createElement('div');
        inner.className = 'card-inner';
        const front = document.createElement('div');
        front.className = 'card-front';
        
        let optsHtml = '';
        item.ot.forEach((text, i) => {
            optsHtml += `<button class="opt-btn" onclick="check('${item.q}', '${item.o[i]}', ${i})">${text}</button>`;
        });

        front.innerHTML = `<div class="q-num">Q${item.q}</div><div class="q-text">${item.f}</div><div class="options" id="opts-${item.q}">${optsHtml}</div>`;

        const back = document.createElement('div');
        back.className = 'card-back';
        back.onclick = () => card.classList.toggle('is-flipped');
        back.innerHTML = `<div class="ans-label">正解: ${item.a}</div><div class="exp-text">${item.e}</div>`;

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);
        container.appendChild(card);
    });
}

function check(qNum, selected, idx) {
    const card = document.getElementById(`card-${qNum}`);
    const item = quizData.find(d => d.q === qNum);
    const btns = document.getElementById(`opts-${qNum}`).getElementsByClassName('opt-btn');

    if (!card.hasAttribute('data-done')) {
        totalAnswered++;
        card.setAttribute('data-done', 'true');
        if (selected === item.a) { correctCount++; } 
        else { wrongSet.add(qNum); updateWrongs(); }
    }

    for (let b of btns) b.classList.remove('correct', 'wrong');
    if (selected === item.a) {
        btns[idx].classList.add('correct');
        setTimeout(() => card.classList.add('is-flipped'), 200);
    } else {
        btns[idx].classList.add('wrong');
        btns[item.o.indexOf(item.a)].classList.add('correct');
        setTimeout(() => card.classList.add('is-flipped'), 500);
    }
    scoreDisp.innerText = `Score: ${correctCount} / ${totalAnswered}`;
}

function updateWrongs() {
    wrongList.innerText = Array.from(wrongSet).sort((a,b)=>a-b).map(n=>`Q${n}`).join(', ');
}

render();
</script>
