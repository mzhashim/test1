const scoreBoard = document.getElementById('scoreBoard');
const wrongListUl = document.getElementById('wrongList');

// スコア更新
function updateScore() {
    const percent = totalAnswered === 0 ? 0 : Math.round((correctCount / totalAnswered) * 100);
    scoreBoard.innerText = `Score: ${correctCount} / ${totalAnswered} (${percent}%)`;
}

// 不正解リスト更新
function updateWrongList() {
    wrongListUl.innerHTML = '';
    wrongQuestions.sort((a, b) => parseInt(a) - parseInt(b));
    wrongQuestions.forEach(qNum => {
        const li = document.createElement('li');
        li.innerText = `Q${qNum}`;
        wrongListUl.appendChild(li);
    });
}

// カード生成
data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${item.q}`;
    
    // カード全体のクリックイベント
    card.onclick = () => {
        if (card.classList.contains('answered')) {
            card.classList.toggle('is-flipped');
        }
    };

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    // 表面
    const front = document.createElement('div');
    front.className = 'card-front';
    
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';
    item.oText.forEach((text, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = text;
        btn.onclick = (e) => {
            e.stopPropagation();
            checkAnswer(item, item.o[index], btn, card);
        };
        optionsDiv.appendChild(btn);
    });

    front.innerHTML = `
        <div class="card-header">QUESTION ${item.q}</div>
        <div class="question-text">${item.f}</div>
    `;
    front.appendChild(optionsDiv);

    // 裏面
    const back = document.createElement('div');
    back.className = 'card-back';
    const explanationText = item.b ? item.b.replace(/\n/g, '<br>') : "No explanation provided.";
    back.innerHTML = `
        <div class="card-header">Q${item.q} Result (Click to flip back)</div>
        <div id="result-label-${item.q}"></div>
        <div class="answer-text">Answer: ${item.ans}</div>
        <div class="explanation">${explanationText}</div>
    `;

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    container.appendChild(card);
});

// 正誤判定
function checkAnswer(item, selected, btn, card) {
    if (card.classList.contains('answered')) return;

    totalAnswered++;
    const isCorrect = (selected === item.ans);
    
    if (isCorrect) {
        correctCount++;
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        if (!wrongQuestions.includes(item.q)) {
            wrongQuestions.push(item.q);
            updateWrongList();
        }
    }

    const resultLabel = document.getElementById(`result-label-${item.q}`);
    resultLabel.className = isCorrect ? 'result-label label-correct' : 'result-label label-wrong';
    resultLabel.innerText = isCorrect ? '正解！' : '不正解...';

    updateScore();

    // 回答後はボタンを無効化
    const buttons = card.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);
    card.classList.add('answered');

    // 0.6秒後に自動で裏返す
    setTimeout(() => {
        card.classList.add('is-flipped');
    }, 600);
}
</script>

</body>
</html>
