const container = document.getElementById('cardContainer');
const scoreBoard = document.getElementById('scoreBoard');
const wrongListUl = document.getElementById('wrongList');

function updateScore() {
    const percent = totalAnswered === 0 ? 0 : Math.round((correctCount / totalAnswered) * 100);
    scoreBoard.innerText = `Score: ${correctCount} / ${totalAnswered} (${percent}%)`;
}

function updateWrongList() {
    wrongListUl.innerHTML = '';
    wrongQuestions.sort((a, b) => parseInt(a) - parseInt(b));
    wrongQuestions.forEach(qNum => {
        const li = document.createElement('li');
        li.innerText = `Q${qNum}`;
        wrongListUl.appendChild(li);
    });
}

data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${item.q}`;
    
    card.onclick = () => {
        if (card.classList.contains('answered')) {
            card.classList.toggle('is-flipped');
        }
    };

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    const front = document.createElement('div');
    front.className = 'card-front';
    
    const optionsDiv = document.createElement('div');
    item.oText.forEach((text, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = text;
        btn.onclick = (e) => {
            e.stopPropagation();
            checkAnswer(item, item.o[index], btn, card);
        };
        optionsDiv.appendChild(btn);
    });

    front.innerHTML = `
        <div class="card-front-header">Q${item.q}</div>
        <div class="question-text">${item.f}</div>
    `;
    front.appendChild(optionsDiv);

    const back = document.createElement('div');
    back.className = 'card-back';
    back.innerHTML = `
        <div class="card-front-header" style="color:#bdc3c7;">Q${item.q} Result (Click to flip back)</div>
        <div id="result-label-${item.q}"></div>
        <div class="answer-text">Answer: ${item.ans}</div>
        <div class="explanation">${item.b.includes('\n') ? item.b.split('\n').slice(1).join('\n') : ''}</div>
    `;

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    container.appendChild(card);
});

function checkAnswer(item, selected, btn, card) {
    if (card.classList.contains('answered')) return;

    totalAnswered++;
    const isCorrect = (selected === item.ans);
    
    if (isCorrect) {
        correctCount++;
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        if (!wrongQuestions.includes(item.q)) {
            wrongQuestions.push(item.q);
            updateWrongList();
        }
    }

    const resultLabel = document.getElementById(`result-label-${item.q}`);
    resultLabel.className = isCorrect ? 'result-label label-correct' : 'result-label label-wrong';
    resultLabel.innerText = isCorrect ? '正解！' : '不正解...';

    updateScore();

    const buttons = card.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);
    
    card.classList.add('answered');

    setTimeout(() => {
        card.classList.add('is-flipped');
    }, 600);
}
</script>
